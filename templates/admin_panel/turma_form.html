{% extends 'base.html' %}
{% block title %}{% if turma %}Editar{% else %}Nova{% endif %} Turma{% endblock %}
{% block content %}
<div class="container mt-4">
  <h2>{% if turma %}Editar{% else %}Nova{% endif %} Turma</h2>
  <div class="card"><div class="card-body">
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-success" type="submit">Salvar</button>
      <a href="{% url 'admin_panel:turmas_list' %}" class="btn btn-secondary">Voltar</a>
    </form>
  </div></div>
</div>
{% endblock %}

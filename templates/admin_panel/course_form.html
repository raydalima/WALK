{% extends 'base.html' %}
{% block title %}{% if course %}Editar{% else %}Nova{% endif %} Disciplina - WALK{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">
        <i class="bi bi-journal-text text-primary"></i> 
        {% if course %}Editar{% else %}Nova{% endif %} Disciplina
    </h2>
    
    <div class="card">
        <div class="card-body">
            <form method="post" action="">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success">
                        {% if course %}Salvar Alterações{% else %}Criar{% endif %}
                    </button>
                    <a href="{% url 'admin_panel:disciplinas_list' %}" class="btn btn-secondary">Voltar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

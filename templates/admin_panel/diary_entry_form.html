{% extends 'base.html' %}
{% block title %}Registro de Diário{% endblock %}
{% block content %}
<div class="container mt-4">
  <h2>{% if entry %}Editar{% else %}Novo{% endif %} Registro de Diário</h2>
  <div class="card"><div class="card-body">
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-success" type="submit">Salvar</button>
      <a href="{% url 'admin_panel:diary_entries_list' %}" class="btn btn-secondary">Voltar</a>
    </form>
  </div></div>
</div>
{% endblock %}

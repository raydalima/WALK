{% extends 'base.html' %}
{% block title %}{% if link %}Editar{% else %}Novo{% endif %} Link Importante{% endblock %}

{% block content %}
<div class="container mt-4">
  <h2 class="mb-4">
    <i class="bi bi-link-45deg text-primary"></i>
    {% if link %}Editar{% else %}Novo{% endif %} Link Importante
  </h2>

  <div class="card">
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-success">Salvar</button>
          <a href="{% url 'admin_panel:important_links_list' %}" class="btn btn-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

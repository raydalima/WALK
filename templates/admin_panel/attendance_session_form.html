{% extends 'base.html' %}
{% block title %}Nova Sessão de Frequência{% endblock %}
{% block content %}
<div class="container mt-4">
  <h2>Nova Sessão de Frequência</h2>
  <div class="card"><div class="card-body">
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-success" type="submit">Salvar</button>
      <a href="{% url 'admin_panel:attendance_sessions_list' %}" class="btn btn-secondary">Voltar</a>
    </form>
  </div></div>
</div>
{% endblock %}

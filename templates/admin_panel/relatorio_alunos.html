{% extends 'base.html' %}

{% block content %}
<h1>Alunos da disciplina: {{ course }}</h1>
<a href="{% url 'admin_panel:relatorio_alunos_csv' course.id %}" class="btn btn-secondary">Exportar CSV</a>
<ul>
  {% for aluno in alunos %}
    <li>{{ aluno.user.get_full_name|default:aluno.user.username }} ({{ aluno.user.email }})</li>
  {% empty %}
    <li>Nenhum aluno matriculado.</li>
  {% endfor %}
</ul>
{% endblock %}

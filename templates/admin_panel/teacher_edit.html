{% extends 'base.html' %}
{% block title %}Editar professor - WALK{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4"><i class="bi bi-pencil text-primary"></i> Editar Perfil de {{ teacher.user.get_full_name }}</h2>
    
    <div class="card">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle"></i> Atualizar</button>
                    <a href="{% url 'admin_panel:teachers_list' %}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

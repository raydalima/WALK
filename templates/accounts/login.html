{% extends 'base.html' %}

{% block title %}Entrar - WALK{% endblock %}

{% block content %}
<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card p-4">
        <h3 class="mb-3">Entrar {% if role %}- {{ role }}{% endif %}</h3>

        {% if messages %}
          {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
          {% endfor %}
        {% endif %}

        <form method="post" action="{% url 'accounts:login' %}" novalidate>
          {% csrf_token %}
          <input type="hidden" name="next" value="{{ next }}">

          <div class="mb-3">
            <label for="id_username" class="form-label">E-mail ou nome de usuário</label>
            <input type="text" name="username" id="id_username" class="form-control" value="{{ request.POST.username|default:'' }}" required>
          </div>

          <div class="mb-3">
            <label for="id_password" class="form-label">Senha</label>
            <input type="password" name="password" id="id_password" class="form-control" required>
          </div>

          <div class="d-flex justify-content-between align-items-center">
            <button type="submit" class="btn btn-primary">Entrar</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Perfil do Aluno{% endblock %}
{% block content %}
<div class="container mt-4">
  <div class="card">
    <div class="card-header">Dados do Perfil</div>
    <div class="card-body">
      <p><strong>Nome:</strong> {{ user.get_full_name }}</p>
      <p><strong>E-mail:</strong> {{ user.email }}</p>
      <p><strong>Telefone:</strong> {{ student.phone }}</p>
      <p><strong>Número de matrícula:</strong> {{ student.enrollment_number }}</p>
      <p><strong>Curso:</strong> {{ student.course }}</p>
    </div>
  </div>
</div>
{% endblock %}

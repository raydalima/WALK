<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Disciplinas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>Disciplinas</h1>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>#</th>
                <th>Nome</th>
                <th>Área</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            {% for c in courses %}
            <tr>
                <td>{{ forloop.counter }}</td>
                <td>{{ c.nome }}</td>
                <td>{{ c.area }}</td>
                <td>
                    <a href="{% url 'students:course_detail' c.id %}" class="btn btn-sm btn-outline-secondary">Ver</a>
                    <a href="{% url 'students:export_enrollment_doc' c.id %}" class="btn btn-sm btn-outline-primary">DOC</a>
                    <a href="{% url 'students:export_enrollment_pdf' c.id %}" class="btn btn-sm btn-outline-danger">PDF</a>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="5">Nenhum curso encontrado.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
